<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Bakeoff 3</title>
    <link rel="stylesheet" type="text/css" href="css/main.css">
</head>
<body>
    <div id="app">

        <!-- screen 1: pick genre filters + time window -->
        <div id="screen1">
            <h2>Find a Movie</h2>

            <div class="filter-row">
                <div class="row-label">Include genres</div>
                <div id="s1Include" class="genre-group"></div>
            </div>

            <div class="filter-row">
                <div class="row-label">Exclude genres</div>
                <div id="s1Exclude" class="genre-group"></div>
            </div>

            <div class="filter-row slider-row">
                <label class="row-label" for="s1Start">Start time</label>
                <div class="slider-control">
                    <input type="range" id="s1Start" step="15">
                    <span id="s1StartLabel" class="slider-value">—</span>
                </div>
            </div>

            <div class="filter-row slider-row">
                <label class="row-label" for="s1End">End time</label>
                <div class="slider-control">
                    <input type="range" id="s1End" step="15">
                    <span id="s1EndLabel" class="slider-value">—</span>
                </div>
            </div>

            <div class="screen-footer">
                <button id="nextBtn" class="btn-primary">Next →</button>
            </div>
        </div>

        <!-- screen 2: filtered movie list, filters editable at top -->
        <div id="screen2" style="display:none">
            <div class="s2-header">
                <h2>Recommended Movies</h2>
            </div>

            <details class="filter-panel">
                <summary class="filter-toggle">Filters</summary>
                <div class="filter-panel-body">
                    <div class="filter-row">
                        <div class="row-label">Include genres</div>
                        <div id="s2Include" class="genre-group"></div>
                    </div>

                    <div class="filter-row">
                        <div class="row-label">Exclude genres</div>
                        <div id="s2Exclude" class="genre-group"></div>
                    </div>

                    <div class="filter-row slider-row">
                        <label class="row-label" for="s2Start">Start time</label>
                        <div class="slider-control">
                            <input type="range" id="s2Start" step="15">
                            <span id="s2StartLabel" class="slider-value">—</span>
                        </div>
                    </div>

                    <div class="filter-row slider-row">
                        <label class="row-label" for="s2End">End time</label>
                        <div class="slider-control">
                            <input type="range" id="s2End" step="15">
                            <span id="s2EndLabel" class="slider-value">—</span>
                        </div>
                    </div>
                </div>
            </details>

            <div id="movieList"></div>
        </div>

        <!-- screen 3: confirm showtime + enter name + tickets -->
        <div id="screen3" style="display:none">
            <div id="s3Info"></div>

            <div class="s3-section">
                <h3>Select Showtime:</h3>
                <div id="s3Times" class="showtime-row"></div>
            </div>

            <div class="s3-section">
                <div class="s3-form">
                    <label>Enter Name: <input type="text" id="s3Name" placeholder="your name"></label>
                    <label>Tickets: <input type="number" id="s3Tickets" min="1" max="20"></label>
                </div>
            </div>

            <div class="s3-actions">
                <button id="backBtn" class="btn-secondary">← Back</button>
                <button id="submitBtn" class="btn-primary">Submit</button>
            </div>
        </div>

    </div>
    <!-- The following line, "./js/framework.js", *will* be changed before the real Bakeoff. -->
    <script src="./js/framework.js"></script>
    <!-- Your js code should be loaded from local file: -->
    <script src="./js/main.js"></script>
</body>
</html>
